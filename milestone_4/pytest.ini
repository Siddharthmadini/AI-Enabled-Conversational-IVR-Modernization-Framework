[pytest]
testpaths = milestone_4/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests — fast, isolated, no external deps
    integration: Integration tests — multi-step, session state
    e2e: End-to-end tests — full user journey
    performance: Performance/load tests — may be slow
    error_handling: Error handling and logging tests
